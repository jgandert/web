        <style>

    <body>
        <main>
            <section>
                <h2>Themed Ipsum Generator</h2>

                <div class="segmented-control" role="group" aria-label="Generator Theme">
                    <input type="radio" name="generator" id="gen-gourmet" value="gourmet" checked>

                <div class="mt-4 flex-row gap-4">

                    <div class="flex-1">

                </div>

                <div id="output"></div>
            </section>

        <script>
        /**
         * Core foundation for all themed generators. Handles paragraph/sentence structure,
         * history tracking to avoid immediate repetitions, and common string utilities.
         */
        class BaseGenerator {
            constructor(themeName) {
                if (new.target === BaseGenerator) {
                    throw new TypeError("Cannot construct Abstract instances of BaseGenerator directly. Please extend this class.");
                }
                this.themeName = themeName;
                this.history = new Map();
                this.templateHistory = [];
            }

            getTemplateType(max) {
                // Ensure we don't repeat the same template too soon.
                // Limit history to half the number of templates or 5.
                const historyLimit = Math.max(1, Math.min(Math.floor(max / 2), 5));
                let type;
                let attempts = 0;
                do {
                    type = Math.floor(Math.random() * max);
                    attempts++;
                } while (this.templateHistory.includes(type) && attempts < 100);

                this.templateHistory.push(type);
                if (this.templateHistory.length > historyLimit) {
                    this.templateHistory.shift();
                }
                return type;
            }

            generateSentence() {
                throw new Error(`Method 'generateSentence()' must be implemented in the ${this.themeName} subclass.`);
            }

            /**
             * Core generation engine. Calls the subclass's generateSentence method to build the output.
             * @param {number} paragraphsCount - The number of paragraphs to generate.
             * @param {number} sentencesPerParagraph - The number of sentences per paragraph.
             * @returns {string[]} An array of strings, where each string is a complete paragraph.
             */
            generate(paragraphsCount, sentencesPerParagraph) {
                const paragraphs = [];
                for (let p = 0; p < paragraphsCount; p++) {
                    const currentParagraphSentences = [];
                    for (let s = 0; s < sentencesPerParagraph; s++) {
                        currentParagraphSentences.push(this.generateSentence());
                    }
                    paragraphs.push(currentParagraphSentences.join(" "));
                }
                return paragraphs;
            }

            // --- Utility Methods for Subclasses ---

            /**
             * Selects a random element from a provided array avoiding recent duplicates.
             * @param {Array} array - The vocabulary array to pull from.
             * @returns {string} A random string from the array.
             */
            sample(array) {
                if (!array || array.length === 0) return "";
                if (array.length === 1) return array[0];

                let lastUsed = this.history.get(array);
                if (!lastUsed) {
                    lastUsed = [];
                    this.history.set(array, lastUsed);
                }

                let available = array.filter(item => !lastUsed.includes(item));

                if (available.length === 0) {
                    available = array;
                    lastUsed.length = 0;
                }

                const picked = available[Math.floor(Math.random() * available.length)];
                lastUsed.push(picked);

                const maxHistory = Math.min(5, Math.floor(array.length / 2));
                if (lastUsed.length > Math.max(1, maxHistory)) {
                    lastUsed.shift();
                }

                return picked;
            }

            capitalize(string) {
                if (!string) return "";
                return string.charAt(0).toUpperCase() + string.slice(1);
            }

            getArticle(word) {
                if (!word) return "";
                const vowels = ["a", "e", "i", "o", "u"];
                const startsWithVowel = vowels.includes(word.charAt(0).toLowerCase());
                return startsWithVowel ? `an ${word}` : `a ${word}`;
            }

            toGerund(verb) {
                const exceptions = { "puree": "pureeing", "flambé": "flambéing", "pan-fry": "pan-frying", "deep-fry": "deep-frying", "sous-vide": "sous-viding", "bake-blind": "baking-blind" };
                if (exceptions[verb]) return exceptions[verb];
                if (verb.endsWith("e") && !verb.endsWith("ee")) return verb.slice(0, -1) + "ing";
                const cvcRegex = /([^aeiou][aeiou])([bdfglmnprstz])$/i;
                if (cvcRegex.test(verb) && verb.length < 6) return verb + verb.charAt(verb.length - 1) + "ing";
                return verb + "ing";
            }

            toPastParticiple(verb) {
                if (!verb) return "";
                const exceptions = { "sous-vide": "sous-vided", "pan-fry": "pan-fried", "deep-fry": "deep-fried", "bake-blind": "baked-blind", "A/B test": "A/B tested" };
                if (exceptions[verb]) return exceptions[verb];
                if (verb.endsWith("e") && !verb.endsWith("ee")) return verb + "d";
                if (verb.endsWith("y") && !verb.match(/[aeiou]y$/i)) return verb.slice(0, -1) + "ied";
                const cvcRegex = /([^aeiou][aeiou])([bdfglmnprstz])$/i;
                if (cvcRegex.test(verb) && verb.length < 6) return verb + verb.charAt(verb.length - 1) + "ed";
                return verb + "ed";
            }

            pluralize(word) {
                if (!word) return "";
                if (word.endsWith("s") || word.endsWith("x") || word.endsWith("ch") || word.endsWith("sh")) return word + "es";
                if (word.endsWith("y") && !["a", "e", "i", "o", "u"].includes(word.slice(-2, -1).toLowerCase())) return word.slice(0, -1) + "ies";
                return word + "s";
            }
        }
